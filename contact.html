<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vedant Hage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">vedant<span style="color:var(--text-faint)">.dev</span></a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="Vedant_Hage_Resume.pdf" target="_blank" rel="noopener">Resume ↗</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="section-head">
            <div class="eyebrow">contact</div>
            <h2>Let's Talk</h2>
        </div>

        <div class="contact-grid">
            <div class="card" style="height: fit-content;">
                <h3 style="margin-bottom: 16px;">Reach me directly</h3>
                <div class="contact-info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <a href="mailto:vedanthage4@gmail.com">vedanthage4@gmail.com</a>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-phone"></i>
                    <a href="tel:+919021961650">+91 90219 61650</a>
                </div>
                <div class="contact-info-item">
                    <i class="fab fa-github"></i>
                    <a href="https://github.com/VedantHage1210" target="_blank" rel="noopener">github.com/VedantHage1210</a>
                </div>
                <div class="contact-info-item">
                    <i class="fab fa-linkedin"></i>
                    <a href="https://www.linkedin.com/in/vedant-hage-471a42359" target="_blank" rel="noopener">linkedin.com/in/vedant-hage</a>
                </div>
                <div class="contact-info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Akola, Maharashtra, India</span>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px;">Send a message</h3>
                <form id="contactForm" name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
                    <input type="hidden" name="form-name" value="contact">
                    <p style="display:none;">
                        <label>Don't fill this out: <input name="bot-field"></label>
                    </p>

                    <div class="field">
                        <label class="field-label" for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="field">
                        <label class="field-label" for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="field">
                        <label class="field-label" for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="btn" id="sendBtn">
                        <i class="fa-regular fa-paper-plane"></i> Send Message
                    </button>
                    <div class="form-status" id="formStatus"></div>
                </form>
            </div>
        </div>
    </div>

    <footer>© 2026 Vedant Hage. Built with HTML, CSS &amp; JS.</footer>
    <script src="script.js"></script>
</body>
</html>
